name: Update Blink Eye Cask - Universal (Intel & ARM)

on:
  workflow_dispatch:  # Allows manual triggering

jobs:
  update-cask:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up jq
        run: sudo apt-get install -y jq

      - name: Fetch Latest Release Information
        id: fetch-release
        run: |
          # Fetch the latest release JSON
          wget -q https://github.com/nomandhoni-cs/blink-eye/releases/latest/download/latest.json -O latest.json

          # Check if the file is downloaded correctly
          if [ ! -s latest.json ]; then
            echo "Error: latest.json file is empty or not fetched properly"
            exit 1
          fi

          # Extract version and URLs using jq
          VERSION=$(jq -r '.version' latest.json)
          URL_INTEL=$(jq -r '.platforms["darwin-x86_64"].url' latest.json)
          URL_ARM=$(jq -r '.platforms["darwin-aarch64"].url' latest.json)

          # Check if the extracted values are empty
          if [ -z "$VERSION" ]; then
            echo "Error: Version not found"
            exit 1
          fi
          if [ -z "$URL_INTEL" ]; then
            echo "Error: Intel URL not found"
            exit 1
          fi
          if [ -z "$URL_ARM" ]; then
            echo "Error: ARM URL not found"
            exit 1
          fi

          # Download the files to calculate checksums
          curl -L -o BlinkEye_x64.tar.gz "$URL_INTEL"
          curl -L -o BlinkEye_aarch64.tar.gz "$URL_ARM"

          # Calculate SHA256 checksums
          SHA256_INTEL=$(sha256sum BlinkEye_x64.tar.gz | awk '{print $1}')
          SHA256_ARM=$(sha256sum BlinkEye_aarch64.tar.gz | awk '{print $1}')

          # Log the values
          echo "Version: $VERSION"
          echo "Intel URL: $URL_INTEL"
          echo "Intel SHA256: $SHA256_INTEL"
          echo "ARM URL: $URL_ARM"
          echo "ARM SHA256: $SHA256_ARM"

          # Set environment variables
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "SHA256_INTEL=$SHA256_INTEL" >> $GITHUB_ENV
          echo "SHA256_ARM=$SHA256_ARM" >> $GITHUB_ENV

      - name: Update Cask File
        run: |
          # Create the new cask content with both architectures
          cat > Casks/blinkeye.rb << 'CASKFILE'
          cask "blinkeye" do
            version "$VERSION"

            on_intel do
              sha256 "$SHA256_INTEL"
              url "https://github.com/nomandhoni-cs/blink-eye/releases/download/v#{version}/Blink.Eye_x64.app.tar.gz",
                  verified: "github.com/nomandhoni-cs/blink-eye/"
            end

            on_arm do
              sha256 "$SHA256_ARM"
              url "https://github.com/nomandhoni-cs/blink-eye/releases/download/v#{version}/Blink.Eye_aarch64.app.tar.gz",
                  verified: "github.com/nomandhoni-cs/blink-eye/"
            end

            name "Blink Eye"
            desc "Blink Eye - Best Eye Care & Break Timer for Mac, Windows, Linux"
            homepage "https://blinkeye.app/"

            auto_updates true

            app "Blink Eye.app"

            uninstall quit: "com.blinkeye.app"

            caveats <<~EOS
              IMPORTANT NOTICE:

              Apple requires developers to pay $100/year for app notarization. 
              
              As a small developer, this cost is significant, so this app has not been notarized.

              As a result, macOS Gatekeeper might block the app. You can bypass this restriction using one of the following methods:

              1. Via Finder:
                - Right-click the app in Finder.
                - Select "Open" to allow it to run.

              2. Via Terminal:
                - Run the following command to remove the Gatekeeper quarantine attribute:
                  xattr -d com.apple.quarantine /path/to/Blink\ Eye.app

              Your understanding and support for independent developers like me are greatly appreciated! 💡
            EOS

          end
          CASKFILE
          
          # Replace the placeholder variables with actual values
          sed -i "s/\$VERSION/$VERSION/g" Casks/blinkeye.rb
          sed -i "s/\$SHA256_INTEL/$SHA256_INTEL/g" Casks/blinkeye.rb
          sed -i "s/\$SHA256_ARM/$SHA256_ARM/g" Casks/blinkeye.rb

      - name: Commit and Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Casks/blinkeye.rb
          git commit -m "Update Blink Eye Cask to v$VERSION (Intel & ARM)"
          git push origin main
